name: Fix resume card layout

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-resume-card-layout.yml'

permissions:
  contents: write

jobs:
  fix-layout:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Normalize AX and QA card grids and clarify MES workflow
        run: |
          python - <<'PY'
          from pathlib import Path

          ax_path = Path('resume/ax-engineer.html')
          ax = ax_path.read_text(encoding='utf-8')
          ax = ax.replace(
              '.mes-card{grid-column:1/-1;min-height:0}',
              '.mes-card{min-height:430px}.case-card:last-child{grid-column:1/-1;min-height:0}'
          )
          ax = ax.replace(
              '@media(max-width:980px){.case-grid{grid-template-columns:1fr}.mes-card{grid-column:auto}}',
              '@media(max-width:980px){.case-grid{grid-template-columns:1fr}.mes-card,.case-card:last-child{grid-column:auto}}'
          )
          ax = ax.replace(
              '원격지 사용자가 긴 기술문서를 작성하지 않아도 문제를 전달할 수 있도록 장비 화면의 문제 발생 전·후 2개 프레임을 사용했습니다. 사용자는 그림판으로 의심 영역에 동그라미나 화살표를 표시하고, 자연어로 현상과 원래 수행하려던 작업을 설명했습니다. Agent는 두 화면의 변화, 시각적 표시, 사용자 설명과 작업 의도를 함께 읽어 MES 신호·설비 상태·공정 순서 중 확인할 지점을 좁히도록 구성했습니다.',
              '원격지 사용자가 문제를 발견한 즉시 시뮬레이터 Agent와 상호작용해 해결안을 만들 수 있도록 장비 화면의 문제 발생 전·후 2개 프레임을 입력으로 사용했습니다. 사용자는 그림판으로 의심 영역에 동그라미나 화살표를 표시하고, 자연어로 현상과 원래 수행하려던 작업 의도를 설명했습니다. 멀티모달 Agent는 두 화면의 변화·시각적 표시·사용자 설명·작업 의도를 함께 읽어 MES 신호, 설비 상태와 공정 순서를 추론하고 시뮬레이터 수정안을 구현했습니다. 해결안은 사용자 개인 환경에서 끝내지 않고 GitLab Dev 브랜치에 커밋해 개발 MES와 즉시 연동 검증했으며, 개발자가 지속 가능한 변경인지 검토하고 필요한 예외처리를 보강한 뒤 Main으로 병합하도록 구성했습니다.'
          )
          ax = ax.replace(
              '현장 VOC → 전·후 2프레임과 사용자 표시·설명 → Agent 분석·구현 → Dev MES 실연동 검증 → 아키텍처·회귀 검토 → Main 병합',
              '현장 문제 발생 → 사용자와 Agent의 멀티모달 상호작용·즉시 해결 → Dev 브랜치 커밋 → 개발 MES 실연동 검증 → 개발자 예외처리·지속가능성 검토 → Main 병합'
          )
          ax_path.write_text(ax, encoding='utf-8')

          qa_path = Path('resume/qa-automation.html')
          qa = qa_path.read_text(encoding='utf-8')
          qa = qa.replace(
              '.card:nth-child(7){border-top-color:var(--blue)}.card p,.panel p',
              '.card:nth-child(7){border-top-color:var(--blue)}.card:last-child{grid-column:1/-1;min-height:0}.card p,.panel p'
          )
          qa = qa.replace(
              '@media(max-width:900px){.hero-sheet,.portfolio-grid,.operating,.failure-map{grid-template-columns:1fr}.hero-side',
              '@media(max-width:900px){.hero-sheet,.portfolio-grid,.operating,.failure-map{grid-template-columns:1fr}.card:last-child{grid-column:auto}.hero-side'
          )
          qa = qa.replace(
              '사용자가 장비 화면의 전·후 프레임에 그림판으로 동그라미나 화살표를 표시하고 자연어로 현상과 의도를 설명하면 Agent가 화면 변화와 업무 맥락을 함께 읽도록 구성했습니다. QA와 비개발자가 필요한 개선을 직접 제안·구현 가능한 형태로 바꾸되 운영 반영 권한은 분리했습니다.',
              'QA와 비개발자가 문제를 발견한 즉시 시뮬레이터 Agent와 상호작용해 해결안을 만들 수 있도록 장비 화면의 전·후 2개 프레임, 그림판 동그라미·화살표 표시, 자연어 현상 설명과 원래 수행하려던 작업 의도를 함께 입력했습니다. 멀티모달 Agent는 화면 변화와 업무 맥락을 해석해 시뮬레이터 수정안을 구현하고, 해결한 브랜치를 GitLab Dev에 커밋했습니다. 담당자는 개발 MES에서 바로 동작을 확인하고, 개발자는 해당 변경이 지속 가능한 구조인지 검토한 뒤 예외처리를 보강해 Main으로 병합했습니다. 즉, 단순한 문제 전달 자동화가 아니라 현장 문제를 발생 즉시 해결하고 검증 가능한 코드 변경으로 전환하는 폐루프를 구축했습니다.'
          )
          qa_path.write_text(qa, encoding='utf-8')
          PY
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add resume/ax-engineer.html resume/qa-automation.html
          git diff --cached --quiet || git commit -m "Fix resume card grids and clarify MES agent workflow"
          git push
